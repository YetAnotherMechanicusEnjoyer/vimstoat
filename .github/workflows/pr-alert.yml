name: PR Alerts
on:
  pull_request_target:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Stoat
        env:
          STOAT_WEBHOOK_URL: ${{ secrets.STOAT_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$STOAT_WEBHOOK_URL" ]; then
            echo "Error: Webhook URL secret is not set."
            exit 1
          fi
          
          # Safely construct JSON payload
          PAYLOAD=$(jq -n --arg content "New PR opened: $PR_TITLE\n$PR_URL" '{content: $content}')
          
          curl -X POST -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "$STOAT_WEBHOOK_URL"

